        type: string
      - name: body
        label: Page Content
        type: rich-text

  - name: profile
    label: Profile Data
    type: file
    path: src/content/profile/main.yaml
    format: yaml
    fields:
      - name: name
        type: string
        required: true
      - name: title
        type: string
        required: true
      - name: affiliation
        type: string
        required: true
      - name: email
        type: string
        required: true
      - name: phone
        type: string
      - name: office
        type: string
      - name: orcid
        type: string
      - name: cvUrl
        type: string
      - name: publicationsPdfUrl
        type: string
      - name: heroTags
        type: string
        list: true
      - name: interests
        type: string
        list: true

  - name: publications
    label: Publications Data
    type: file
    path: src/content/publications/list.yaml
    format: yaml
    fields:
      - name: updated
        type: string
        required: true
      - name: items
        label: Publication Items
        type: object
        list:
          collapsible:
            collapsed: true
            summary: '{fields.year} - {fields.title}'
        fields:
          - name: id
            type: string
            required: true
          - name: year
            type: number
            required: true
          - name: status
            type: select
            options:
              values: [published, forthcoming]
            required: true
          - name: type
            type: select
            options:
              values: [book, edited_volume, chapter, article, other]
            required: true
          - name: title
            type: text
            required: true
          - name: authors
            type: text
            required: true
          - name: venue
            type: text
            required: true
          - name: details
            type: text
          - name: doi
            type: string
          - name: url
            type: string

settings:
  content:
    merge: true
  commit:
    templates:
      create: 'content(create): {path}'
      update: 'content(update): {path}'
      delete: 'content(delete): {path}'
      rename: 'content(rename): {oldPath} -> {newPath}'
