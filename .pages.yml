media:
  input: public/uploads
  output: /uploads
  rename: true

content:
  - name: pages_en
    label: Pages (English)
    type: collection
    path: src/content/pages/en
    filename:
      template: '{primary}.md'
      field: create
    subfolders: true
    view:
      layout: tree
      primary: title
      fields: [title, navTitle, showInNav, order]
      node:
        filename: index.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: navTitle
        label: Navigation Title
        type: string
      - name: description
        label: Description
        type: text
      - name: excerpt
        label: Short Excerpt
        type: text
      - name: showInNav
        label: Show In Main Navigation
        type: boolean
        default: false
      - name: order
        label: Sort Order
        type: number
        default: 999
      - name: heroImage
        label: Hero Image
        type: image
      - name: themeIcon
        label: Theme Icon
        type: string
      - name: body
        label: Page Content
        type: rich-text

  - name: pages_he
